name: Production build and submit

on:
  push:
    tags:
      - "*.*.0"

jobs:
  build_android:
    name: Build Android
    type: build
    env:
      APP_VERSION: ${{ github.ref_name }}
    params:
      platform: android
      profile: production-apk

  # build_ios:
