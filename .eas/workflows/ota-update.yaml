name: OTA update

on:
  push:
    tags:
      - "*.*.*"
      - "!*.*.0"
      - "!*-critical-*"

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    env:
      APP_VERSION: ${{ github.ref_name }}

  resolve_runtime_version:
    name: Resolve runtime version
    outputs:
      runtime_version: ${{ steps.compute.outputs.runtime_version }}
    steps:
      - id: compute
        name: Derive major.minor.0 from tag
        run: |
          VERSION="${{ github.ref_name }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          set-output runtime_version "${MAJOR}.${MINOR}.0"

  get_android_build:
    name: Check for existing Android build
    needs: [fingerprint, resolve_runtime_version]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      runtime_version: ${{ needs.resolve_runtime_version.outputs.runtime_version }}
      profile: production

  get_ios_build:
    name: Check for existing iOS build
    needs: [fingerprint, resolve_runtime_version]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      runtime_version: ${{ needs.resolve_runtime_version.outputs.runtime_version }}
      profile: production

  verify_builds:
    name: Verify builds exist
    needs: [get_android_build, get_ios_build]
    steps:
      - name: Check Android build
        run: |
          BUILD_ID="${{ needs.get_android_build.outputs.build_id }}"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "undefined" ]; then
            echo "No Android build found matching fingerprint and runtime version"
            exit 1
          fi
          echo "Android build found: $BUILD_ID"
      - name: Check iOS build
        run: |
          BUILD_ID="${{ needs.get_ios_build.outputs.build_id }}"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "undefined" ]; then
            echo "No iOS build found matching fingerprint and runtime version"
            exit 1
          fi
          echo "iOS build found: $BUILD_ID"

  publish_update:
    name: Publish update
    needs: [verify_builds]
    type: update
    env:
      APP_VERSION: ${{ github.ref_name }}
    params:
      branch: production
