name: Check native build exists

on:
  push:
    branches:
      - "release-*.*.0"

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    env:
      APP_VERSION: ${{ substring(github.ref_name, 8) }}

  get_android_build:
    name: Find Android build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      runtime_version: ${{ substring(github.ref_name, 8) }}
      profile: production-apk # for demonstration purposes only

  get_ios_build:
    name: Find iOS build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      runtime_version: ${{ substring(github.ref_name, 8) }}
      profile: production-simulator # for demonstration purposes only

  verify_builds:
    name: Verify builds exist
    needs: [get_android_build, get_ios_build]
    steps:
      - name: Check Android build
        run: |
          BUILD_ID="${{ needs.get_android_build.outputs.build_id }}"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "undefined" ]; then
            echo "No Android production build found matching fingerprint and runtime version ${{ substring(github.ref_name, 8) }}"
            exit 1
          fi
          echo "Android build found: $BUILD_ID"
      - name: Check iOS build
        run: |
          BUILD_ID="${{ needs.get_ios_build.outputs.build_id }}"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "undefined" ]; then
            echo "No iOS production build found matching fingerprint and runtime version ${{ substring(github.ref_name, 8) }}"
            exit 1
          fi
          echo "iOS build found: $BUILD_ID"
